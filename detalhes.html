<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Álbum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-dark bg-dark mb-5 border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Voltar para Início</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="detalhe-conteudo">
            </div>

        <hr class="my-5 border-secondary">

        <h3 class="mb-4 text-success">Faixas</h3>
        <div class="row g-3" id="secao-atracoes">
            </div>
    </div>
<hr class="my-5 border-secondary">

<section id="critica-usuario" class="pb-5">
    <h3 class="mb-4 text-success">Deixe sua Crítica</h3>
    <div class="bg-dark p-4 rounded border border-secondary">
        <div class="mb-3">
            <label for="texto-critica" class="form-label text-secondary">O que você achou deste álbum?</label>
            <textarea class="form-control bg-black text-white border-secondary" id="texto-critica" rows="4" placeholder="Escreva sua análise aqui..."></textarea>
        </div>
        <button type="button" class="btn btn-success" onclick="salvarCritica()">Publicar Crítica</button>
        
        <div id="feedback-critica" class="mt-4 d-none">
            <h6 class="text-success">Sua crítica enviada:</h6>
            <p id="exibir-critica" class="fst-italic border-start border-success ps-3"></p>
        </div>
    </div>
</section>
    <script src="./js/app.js"></script>
    <script>document.addEventListener('DOMContentLoaded', carregarDetalhes);</script>
</body>
</html>
